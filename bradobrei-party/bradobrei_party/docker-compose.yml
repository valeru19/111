services:
  postgres:
    platform: linux/amd64
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: bradobrei_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bradobrei
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bradobrei"]
      interval: 5s
      timeout: 5s
      retries: 12

  gotenberg:
    platform: linux/amd64
    image: gotenberg/gotenberg:8
    container_name: bradobrei_gotenberg
    restart: unless-stopped
    ports:
      - "3000:3000"

  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bradobrei_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      gotenberg:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: bradobrei
      DB_SSLMODE: disable
      PORT: 9000
      GOTENBERG_URL: http://gotenberg:3000
    ports:
      - "9000:9000"

  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bradobrei_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
